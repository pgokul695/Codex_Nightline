    <path d="M 465 240 C 550 240, 560 350, 465 400 C 360 455, 330 550, 415 615 C 490 670, 560 600, 560 550 C 560 630, 470 690, 385 660 C 290 625, 310 500, 415 450 C 520 400, 510 300, 420 290 C 360 285, 335 325, 340 370 C 320 300, 370 240, 465 240 Z" fill="url(#ribbon-grad)" />
